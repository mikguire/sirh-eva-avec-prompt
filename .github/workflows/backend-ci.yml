name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eva_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d eva_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/eva_test
      JWT_ACCESS_SECRET: ci-access-secret-must-be-32-chars-minimum
      JWT_REFRESH_SECRET: ci-refresh-secret-must-be-32-chars-minimum
      STRIPE_WEBHOOK_SECRET: whsec_ci_test_secret_32_characters___
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Coverage (seuils jest.config.cjs)
        run: npm run test:cov

      - name: Integration tests
        run: npm run test:int
